<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>현장 상세 — 사업수지</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --ink: #1d2433;
      --line: #d5ddeb;
      --primary: #0f766e;
      --primary-light: #e6f4f3;
      --card: #ffffff;
      --muted: #64748b;
      --profit: #0f766e;
      --loss: #b91c1c;
      --warn: #d97706;
      --stage-예상: #6366f1;
      --stage-실행: #0f766e;
      --stage-정산: #d97706;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans KR","Segoe UI",sans-serif; color: var(--ink); background: var(--bg); min-height: 100vh; }

    .header {
      background: var(--card); border-bottom: 1px solid var(--line);
      padding: 14px 24px; display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .back-btn { background: none; border: 1px solid var(--line); border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--muted); }
    .back-btn:hover { border-color: var(--primary); color: var(--primary); }
    .breadcrumb { font-size: 13px; color: var(--muted); }
    .breadcrumb span { color: var(--ink); font-weight: 700; }
    .header h1 { font-size: 18px; font-weight: 800; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .stage-selector { display: flex; gap: 4px; }
    .stage-btn {
      padding: 5px 12px; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--line); background: #fff; color: var(--muted); transition: all .15s;
    }
    .stage-btn.active-예상 { background: #eef2ff; border-color: var(--stage-예상); color: var(--stage-예상); }
    .stage-btn.active-실행 { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .stage-btn.active-정산 { background: #fffbeb; border-color: var(--warn); color: var(--warn); }

    .main { padding: 20px 24px 48px; max-width: 1400px; margin: 0 auto; }

    /* KPI 카드 */
    .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 16px; }
    .kpi-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
    .kpi-card .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .kpi-card .value { font-size: 22px; font-weight: 800; line-height: 1; }
    .kpi-card .delta { font-size: 12px; margin-top: 5px; }
    .delta.up { color: var(--profit); } .delta.down { color: var(--loss); } .delta.neutral { color: var(--muted); }
    .kpi-card.accent { border-color: var(--primary); background: var(--primary-light); }
    .kpi-card.accent .value { color: var(--primary); }

    /* 섹션 카드 */
    .section-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 15px; font-weight: 700; }

    /* 그리드 */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }

    /* 항목별 테이블 */
    .item-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .item-table th { padding: 8px 10px; background: #f8fbff; color: var(--muted); font-weight: 600; border-bottom: 2px solid var(--line); text-align: right; white-space: nowrap; font-size: 12px; }
    .item-table th:first-child { text-align: left; }
    .item-table td { padding: 9px 10px; border-bottom: 1px solid var(--line); text-align: right; }
    .item-table td:first-child { text-align: left; font-weight: 500; }
    .item-table tr:last-child td { border-bottom: none; }
    .item-table tr.total-row td { font-weight: 700; background: #f8fbff; border-top: 2px solid var(--line); border-bottom: none; }
    .item-table tr:hover:not(.total-row) td { background: #fafcff; }
    .stage-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .dot-예상 { background: var(--stage-예상); }
    .dot-실행 { background: var(--stage-실행); }
    .dot-정산 { background: var(--stage-정산); }

    /* 차트 */
    .chart-wrap { position: relative; }
    .chart-wrap.h240 { height: 240px; }
    .chart-wrap.h260 { height: 260px; }
    .chart-wrap.h300 { height: 300px; }

    /* 손익 요약 바 */
    .summary-bar-section { padding: 16px 0 8px; }
    .summary-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .summary-bar-track { height: 12px; background: var(--line); border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
    .summary-bar-fill { height: 100%; border-radius: 999px; transition: width .5s ease; }

    /* 숫자 */
    .profit { color: var(--profit); font-weight: 700; }
    .loss   { color: var(--loss);   font-weight: 700; }
    .warn   { color: var(--warn);   }

    /* 단계 비교 가로 바 */
    .compare-bar-row { margin-bottom: 12px; }
    .compare-bar-label { font-size: 12px; font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .compare-bar-track { display: flex; height: 18px; border-radius: 4px; overflow: hidden; gap: 1px; }
    .compare-bar-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: 700; min-width: 0; transition: flex .5s ease; }

    /* 에러 */
    .error-box { text-align: center; padding: 60px 20px; color: var(--muted); }
    .error-box h2 { font-size: 20px; margin-bottom: 10px; }

    @media (max-width: 1100px) { .kpi-row { grid-template-columns: repeat(3,1fr); } .three-col { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 760px)  { .kpi-row { grid-template-columns: repeat(2,1fr); } .two-col,.three-col { grid-template-columns: 1fr; } }
  </style>
</head>

const fmt     = v => v == null ? "—" : Number(v).toLocaleString("ko-KR");
const fmtRate = v => v == null ? "—" : v.toFixed(1) + "%";
const sign    = v => v >= 0 ? "+" : "";
const pClass  = v => v == null ? "" : v >= 0 ? "profit" : "loss";

function getTotal(stageData) {
  if (stageData == null) return null;
  if (typeof stageData === "object") return stageData.total ?? null;
  return stageData;
}

function loadUploaded(year) {
  try { const r = localStorage.getItem("biz_upload_"+year); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

});

function loadSite() {
  const uploaded = loadUploaded(year);
  const db = uploaded || MOCK_DB[year];
  if (!db) return null;
  return db.sites.find(s => s.id === siteId) || null;
}

        <h2>현장 데이터를 찾을 수 없습니다</h2>
        <p>ID: ${siteId || "없음"} / 연도: ${year}</p>
        <a href="business-dashboard.html" style="color:var(--primary);font-size:14px;margin-top:12px;display:inline-block">← 대시보드로 돌아가기</a>
      </div>`;
    return;
  }

  document.getElementById("siteName").textContent = site.name;
  document.getElementById("headerSub").textContent = `${year}년 사업수지 상세 | ${site.info?.location || ""} | ${site.info?.type || ""}`;
  document.title = site.name + " — 사업수지 상세";

  // 활성 단계 초기화 (정산 데이터 있으면 정산, 없으면 실행)
  activeStage = getTotal(site.income["정산"]) != null ? "정산" : "실행";
  updateStageBtns();

  document.querySelectorAll(".stage-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const stg = btn.dataset.stage;
      if (getTotal(site.income[stg]) == null && getTotal(site.expense[stg]) == null) return;
      activeStage = stg;
      updateStageBtns();
      renderAll(site);
    });
  });

  renderAll(site);
});

function updateStageBtns() {
  document.querySelectorAll(".stage-btn").forEach(btn => {
    btn.className = "stage-btn" + (btn.dataset.stage === activeStage ? " active-"+activeStage : "");
  });
}

function renderAll(site) {
  renderKPI(site);
  renderIncomeTable(site);
  renderExpenseTable(site);
  renderMonthlyChart(site);
  renderExpenseChart(site);
  renderStageCompare(site);
}

// ─────────────────────────────────────────────────────
// KPI 카드
// ─────────────────────────────────────────────────────
function renderKPI(site) {
  const inc  = getTotal(site.income[activeStage]);
  const exp  = getTotal(site.expense[activeStage]);
  const prof = inc != null && exp != null ? inc - exp : null;
  const cr   = inc != null && inc > 0 && exp != null ? (exp / inc) * 100 : null;

  // 달성률
  const baseInc  = getTotal(site.income["예상"]);
  const actualInc = getTotal(site.income["정산"]) ?? getTotal(site.income["실행"]);
  const achv = baseInc && actualInc && baseInc > 0 ? (actualInc / baseInc) * 100 : null;

  const profColor = prof == null ? "var(--ink)" : prof >= 0 ? "var(--profit)" : "var(--loss)";

  const kpiRow = document.getElementById("kpiRow");
  if (!kpiRow) {
    // 첫 렌더 시 KPI row 삽입
    const el = document.createElement("div");
    el.id = "kpiRow";
    el.className = "kpi-row";
    document.getElementById("mainContent").prepend(el);
  }
  document.getElementById("kpiRow").innerHTML = `
    <div class="kpi-card accent">
      <div class="label">수입 (${activeStage})</div>
      <div class="value">${fmt(inc)}<span style="font-size:13px;font-weight:400;margin-left:3px">백만원</span></div>
      <div class="delta neutral">예상 ${fmt(getTotal(site.income["예상"]))} 백만원</div>
    </div>
    <div class="kpi-card">
      <div class="label">지출 (${activeStage})</div>
      <div class="value">${fmt(exp)}<span style="font-size:13px;font-weight:400;margin-left:3px">백만원</span></div>
      <div class="delta neutral">원가율 ${fmtRate(cr)}</div>
    </div>
    <div class="kpi-card" style="border-color:${profColor}30">
      <div class="label">손익 (${activeStage})</div>
      <div class="value" style="color:${profColor}">${prof!=null?sign(prof):""}${fmt(prof)}<span style="font-size:13px;font-weight:400;margin-left:3px">백만원</span></div>
      <div class="delta ${prof==null?'neutral':prof>=0?'up':'down'}">${prof==null?"—":prof>=0?"▲ 흑자":"▼ 적자"}</div>
    </div>
    <div class="kpi-card">
      <div class="label">원가율</div>
      <div class="value" style="color:${cr==null?'var(--ink)':cr>90?'var(--loss)':cr>75?'var(--warn)':'var(--profit)'}">
        ${fmtRate(cr)}
      </div>
      <div class="delta ${cr==null?'neutral':cr>90?'down':cr>75?'warn':'up'}">
        ${cr==null?"—":cr>90?"초과 주의":cr>75?"관리 필요":"양호"}
      </div>
    </div>
    <div class="kpi-card">
      <div class="label">달성률 (수입 기준)</div>
      <div class="value" style="color:${achv==null?'var(--ink)':achv>=95?'var(--profit)':achv>=80?'var(--warn)':'var(--loss)'}">
        ${fmtRate(achv)}
      </div>
      <div class="delta neutral">${site.info?.units ? site.info.units + "세대" : "—"}</div>
    </div>`;
}

// ─────────────────────────────────────────────────────
// 수입 항목 테이블
// ─────────────────────────────────────────────────────
function renderIncomeTable(site) {
  let el = document.getElementById("incomeSection");
  if (!el) return;

  const stages = ["예상","실행","정산"];
  // 모든 단계에서 항목명 수집
  const allItems = new Set();
  stages.forEach(s => {
    (site.income[s]?.items || []).forEach(it => allItems.add(it.name));
  });

  const rows = Array.from(allItems).map(itemName => {
    const vals = stages.map(s => {
      const found = (site.income[s]?.items || []).find(it => it.name === itemName);
      return found ? found.amount : null;
    });
    return `<tr>
      <td>${itemName}</td>
      <td>${fmt(vals[0])}</td>
      <td>${fmt(vals[1])}</td>
      <td>${fmt(vals[2])}</td>
      <td class="${pClass((vals[2]??vals[1])!=null&&vals[0]!=null?(vals[2]??vals[1])-vals[0]:null)}">
        ${vals[0]!=null&&(vals[2]??vals[1])!=null?sign((vals[2]??vals[1])-vals[0])+fmt((vals[2]??vals[1])-vals[0]):"—"}
      </td>
    </tr>`;
  });

  // 합계 행
  const tots = stages.map(s => getTotal(site.income[s]));
  const diff = tots[0]!=null&&(tots[2]??tots[1])!=null?(tots[2]??tots[1])-tots[0]:null;
  rows.push(`<tr class="total-row">
    <td>합계</td>
    <td>${fmt(tots[0])}</td><td>${fmt(tots[1])}</td><td>${fmt(tots[2])}</td>
    <td class="${pClass(diff)}">${diff!=null?sign(diff)+fmt(diff):"—"}</td>
  </tr>`);

  el.querySelector("tbody").innerHTML = rows.join("");
}

// ─────────────────────────────────────────────────────
// 지출 항목 테이블
// ─────────────────────────────────────────────────────
function renderExpenseTable(site) {
  let el = document.getElementById("expenseSection");
  if (!el) return;

  const stages = ["예상","실행","정산"];
  const allItems = new Set();
  stages.forEach(s => {
    (site.expense[s]?.items || []).forEach(it => allItems.add(it.name));
  });

  const rows = Array.from(allItems).map(itemName => {
    const vals = stages.map(s => {
      const found = (site.expense[s]?.items || []).find(it => it.name === itemName);
      return found ? found.amount : null;
    });
    const diff = vals[0]!=null&&(vals[2]??vals[1])!=null?(vals[2]??vals[1])-vals[0]:null;
    return `<tr>
      <td>${itemName}</td>
      <td>${fmt(vals[0])}</td><td>${fmt(vals[1])}</td><td>${fmt(vals[2])}</td>
      <td class="${diff!=null?(diff<=0?'profit':'loss'):''}">
        ${diff!=null?sign(diff)+fmt(diff):"—"}
      </td>
    </tr>`;
  });

  const tots = stages.map(s => getTotal(site.expense[s]));
  const diff = tots[0]!=null&&(tots[2]??tots[1])!=null?(tots[2]??tots[1])-tots[0]:null;
  rows.push(`<tr class="total-row">
    <td>합계</td>
    <td>${fmt(tots[0])}</td><td>${fmt(tots[1])}</td><td>${fmt(tots[2])}</td>
    <td class="${diff!=null?(diff<=0?'profit':'loss'):''}">
      ${diff!=null?sign(diff)+fmt(diff):"—"}
    </td>
  </tr>`);

  el.querySelector("tbody").innerHTML = rows.join("");
}

// ─────────────────────────────────────────────────────
// 월별 추이 차트
// ─────────────────────────────────────────────────────
function renderMonthlyChart(site) {
  const monthly = site.monthly || [];
  if (!monthly.length) return;
  if (chartMonthly) chartMonthly.destroy();
  const ctx = document.getElementById("monthlyChart");
  if (!ctx) return;
  chartMonthly = new Chart(ctx.getContext("2d"), {
    type: "line",
    data: {
      labels: monthly.map(m=>m.month),
      datasets: [
        { label:"수입", data:monthly.map(m=>m.income), borderColor:"#6366f1", backgroundColor:"rgba(99,102,241,.08)", fill:false, tension:.4, pointRadius:3 },
        { label:"지출", data:monthly.map(m=>m.expense), borderColor:"#b91c1c", backgroundColor:"rgba(185,28,28,.06)", fill:false, tension:.4, pointRadius:3 },
        { label:"손익", data:monthly.map(m=>m.income-m.expense), borderColor:"#0f766e", backgroundColor:"rgba(15,118,110,.10)", fill:true, tension:.4, pointRadius:4, borderWidth:2 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:"top",labels:{font:{size:12},boxWidth:12}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${Number(ctx.parsed.y).toLocaleString("ko-KR")} 백만원`}}
      },
      scales:{
        y:{grid:{color:"#e8ecf2"},ticks:{font:{size:11},callback:v=>Number(v).toLocaleString("ko-KR")}},
        x:{grid:{color:"#e8ecf2"},ticks:{font:{size:11}}}
      }
    }
  });
}

// ─────────────────────────────────────────────────────
// 지출 구성 도넛 차트
// ─────────────────────────────────────────────────────
function renderExpenseChart(site) {
  const items = site.expense[activeStage]?.items || [];
  if (!items.length) return;
  if (chartExpense) chartExpense.destroy();
  const ctx = document.getElementById("expenseDonut");
  if (!ctx) return;
  const colors = ["#0f766e","#6366f1","#d97706","#b91c1c","#7c3aed","#0369a1","#64748b"];
  chartExpense = new Chart(ctx.getContext("2d"), {
    type: "doughnut",
    data: {
      labels: items.map(i=>i.name),
      datasets: [{ data: items.map(i=>i.amount), backgroundColor: colors.slice(0,items.length), borderWidth:2, borderColor:"#fff", hoverOffset:8 }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{position:"right",labels:{font:{size:12},boxWidth:12}},
        tooltip:{callbacks:{label:ctx=>{
          const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
          return ` ${ctx.label}: ${Number(ctx.parsed).toLocaleString("ko-KR")} (${(ctx.parsed/total*100).toFixed(1)}%)`;
        }}}
      },
      cutout:"55%"
    }
  });
}

// ─────────────────────────────────────────────────────
// 단계별 비교 바
// ─────────────────────────────────────────────────────
function renderStageCompare(site) {
  const el = document.getElementById("stageCompareSection");
  if (!el) return;
  const stages = ["예상","실행","정산"];
  const incVals = stages.map(s=>getTotal(site.income[s]));
  const expVals = stages.map(s=>getTotal(site.expense[s]));
  const maxInc  = Math.max(...incVals.filter(v=>v!=null));

  const html = stages.map((s, i) => {
    const inc  = incVals[i];
    const exp  = expVals[i];
    const prof = inc!=null&&exp!=null?inc-exp:null;
    if (inc == null) return `
      <div class="compare-bar-row">
        <div class="compare-bar-label"><span><span class="stage-dot dot-${s}"></span>${s}</span><span style="color:var(--muted)">미집계</span></div>
        <div class="compare-bar-track"><div class="compare-bar-seg" style="background:var(--line);flex:1;color:var(--muted);">—</div></div>
      </div>`;
    const profPct = Math.max(inc>0?(prof/inc)*100:0, 0);
    const expPct  = 100 - profPct;
    return `
      <div class="compare-bar-row">
        <div class="compare-bar-label">
          <span><span class="stage-dot dot-${s}"></span>${s}</span>
          <span>수입 ${fmt(inc)} | 지출 ${fmt(exp)} | 손익 <span class="${pClass(prof)}">${sign(prof)}${fmt(prof)}</span></span>
        </div>
        <div class="compare-bar-track" style="height:22px">
          <div class="compare-bar-seg" style="background:var(--stage-${s});flex:${expPct}" title="지출">${exp!=null?fmtRate(exp/inc*100):""}</div>
          <div class="compare-bar-seg" style="background:${prof>=0?'var(--profit)':'var(--loss)'};flex:${Math.max(profPct,2)}" title="손익"></div>
        </div>
      </div>`;
  }).join("");
  el.innerHTML = html;
}
